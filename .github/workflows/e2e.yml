name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright (real DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: worldcup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/worldcup_test
      DATABASE_URL_UNPOOLED: postgresql://postgres:postgres@localhost:5432/worldcup_test
      ADMIN_TOKEN: test-token
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Create schema & seed teams
        run: |
          npx prisma db push --skip-generate
          npm run db:seed
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
