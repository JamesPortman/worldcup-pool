name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-build:
    name: Test & build
    runs-on: ubuntu-latest
    env:
      # Dummy values — no DB connection happens at build/test time (pages are
      # force-dynamic and the unit tests mock Prisma), but the Prisma client
      # needs these vars present to instantiate.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      DATABASE_URL_UNPOOLED: postgresql://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit & component tests
        run: npm run test
      - name: Type-check & production build
        run: npm run build
